name: "Build Reproducer Container"

on:
  push:
    branches:
      - multiarch-emulate

permissions:
  contents: read

jobs:
  build-reproducer-container:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch:
          - aarch64
          - ppc64le
          - s390x
          - x86_64
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          case "${{ matrix.arch }}" in
            aarch64)
              llvm_container_arch="arm64v8"
              ;;
            x86_64)
              llvm_container_arch="amd64"
              ;;
          esac

          if [ -n "$llvm_container_arch ]; then
            extra_args="--optimized_llvm=ghcr.io/llvm/$llvm_container_arch/ci-ubuntu-22.04:9f919661dd2f --llvm_sysroot=/opt/llvm/"
          fi

          sudo apt-get -y update
          sudo apt-get -y install podman qemu-user-static
          podman build  --arch ${{  matrix.arch }} --build-arg arch=${{ matrix.arch }} $extra_args -t "ghcr.io/$GITHUB_REPOSITORY_OWNER/llvm-snapshots-reproducer:${{ matrix.arch }}" -f Containerfile.mass-rebuild scripts/
          podman login -u ${{ github.actor }} -p "$GITHUB_TOKEN" ghcr.io
          podman push "ghcr.io/$GITHUB_REPOSITORY_OWNER/llvm-snapshots-reproducer:${{ matrix.arch }}"
