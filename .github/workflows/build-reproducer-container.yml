name: "Build Reproducer Container"

on:
  push:
    branches:
      - multiarch-emulate

permissions:
  contents: read

jobs:
  build-reproducer-container:
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    strategy:
      matrix:
        arch:
          - aarch64
          - ppc64le
          - s390x
          - x86_64
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          dnf install -y podman qemu-user-static
          podman build  --build-arg arch=${{ matrix.arch }} --arch ${{ matrix.arch }} -t "ghcr.io/$GITHUB_REPOSITORY_OWNER/llvm-snapshots-reproducer:${{ matrix.arch }}" -f Containerfile.mass-rebuild scripts/
          podman login -u ${{ github.actor }} -p "$GITHUB_TOKEN" ghcr.io
          podman push "ghcr.io/$GITHUB_REPOSITORY_OWNER/llvm-snapshots-reproducer:${{ matrix.arch }}"
