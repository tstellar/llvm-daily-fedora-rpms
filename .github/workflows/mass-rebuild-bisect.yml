name: Mass Rebuild Bisect

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      pkg:
        description: "The name of the Fedora package build that you want to bisect."
        required: true
        type: string
  workflow_call:
    inputs:
      pkg:
        description: "The name of the Fedora package build that you want to bisect."
        required: true
        type: string

jobs:
  mass-rebuild-bisect:
    runs-on: ubuntu-24.04
    container:
      image: "ghcr.io/${{ github.repository_owner }}/llvm-snapshots-reproducer"
    steps:
      - run: true
