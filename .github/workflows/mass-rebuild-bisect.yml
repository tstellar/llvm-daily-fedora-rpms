name: Mass Rebuild Bisect

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      pkg:
        description: "The name of the Fedora package build that you want to bisect."
        required: true
        type: string
      issue:
        description: "The id of the issue to update with the bisect results."
        required: false
        type: int
        default: 0
  workflow_call:
    inputs:
      pkg:
        description: "The name of the Fedora package build that you want to bisect."
        required: true
        type: string
      issue:
        description: "The id of the issue to update with the bisect results."
        required: false
        type: int
        default: 0

jobs:
  mass-rebuild-bisect:
    if: github.repository_owner == 'fedora-llvm-team'
    runs-on: ubuntu-24.04
    container:
      image: "ghcr.io/${{ github.repository_owner }}/llvm-snapshots-reproducer"
    steps:
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 8G
          key: bisect
      - working-directory: /root/llvm-project/
        run: |
          git fetch origin
          bash bisect.sh ${{ inputs.pkg }}

      - if: always()
        working-directory: /root/llvm-project
        id: result
        run: |
          git bisect log > bisect.log
          if [ $? -ne 0 ]; then
            echo "result=False Positive" >> $GITHUB_OUTPUT
          else
            echo "result=Bisect Complete" >> $GITHUB_OUTPUT
          fi

      - if: always() && inputs.issue != 0
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: process.env.GITHUB_RUN_ID
            });
            print(workflowRun)
            const bisect_log = await fs.readFileSync('./bisect.log');
            const result_string = "${{ steps.result.outputs.result }}";
            octokit.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: core.getInput(issue),
              body: "${result_string}\n\n${workflow_run}\n\n${bisect_log}"
            })

