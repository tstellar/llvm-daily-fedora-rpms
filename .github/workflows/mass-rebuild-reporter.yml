name: "Mass rebuild reporter"

on:
  schedule:
    - cron: "40 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-for-rebuild:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    container:
      image: "registry.fedoraproject.org/fedora:41"
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/package-list.py
          sparse-checkout-cone-mode: false


      - name: Check for existing report
        uses: actions/github-script@v7
        id: check-existing
        with:
          result-encoding: string
          script: |
            const issues = await github.rest.search.issuesAndPullRequests({
              q: "label:mass-rebuild+state:open",
            });

            console.log(issues)
            if (issues.data.total_count > 0)
                return "skip"
            return "";

      - name: Collect Regressions
        id: regressions
        run: |
          sudo dnf install -y python3-dnf python3-copr
          python3 .github/workflows/package-list.py get-regressions --start-date 2024-11-11 > regressions

      - name: Create Report
        if: steps.check-existing.outputs.result != 'skip'
        uses: actions/github-script@v7
        env:
          REGRESSIONS: ${{ steps.regressions.outputs.REGRESSIONS }}
        with:
          script: |
            var fs = require('fs');
            const data = await JSON.parse(fs.readFileSync('./regressions'));
            const regressions = JSON.parse(data);
            comment = "During the last mass rebuild, some packages failed:\n";
            regressions.forEach(function(value){
              comment.concat('\n', value.name);
              comment.concat(' ', value.url);
            });
            console.log(comment);
